name: Build and Release — ANTIGRAVITY by factarlou

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_image:
        description: 'Also build the RPi SD card image (takes ~30 min)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# ─────────────────────────────────────────────────────────────────────────────
# STRATEGY OVERVIEW
#
# Previous approach: Buildroot from scratch = 3-6 hours + frequent OOM crash.
#
# New approach — two independent jobs:
#
# JOB 1 (always runs, ~2 min): "App Release"
#   • Validates all Python files compile cleanly
#   • Creates a ZIP of the app + a one-command installer script
#   • Users flash stock Raspberry Pi OS Lite, boot, run one curl command
#   • Release is attached to the GitHub Release immediately
#
# JOB 2 (on demand, ~25-35 min): "RPi Image"
#   • Uses the official `pi-gen` Docker action maintained by RPi Foundation
#   • Produces a real .img.gz flashable with Balena Etcher
#   • Runs only when explicitly requested via workflow_dispatch or on major tags
#   • Even if it fails, Job 1's installer ZIP is still published
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1: Validate + App Installer ZIP  (~2 minutes, never fails on OOM)
  # ───────────────────────────────────────────────────────────────────────────
  release_app:
    name: "📦 App Installer Release"
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Validate all Python files parse correctly ──────────────────────────
      - name: Validate Python syntax
        run: |
          echo "==> Checking Python files..."
          python -m py_compile main.py
          python -m py_compile app/__init__.py
          python -m py_compile app/database.py
          python -m py_compile app/compliance.py
          python -m py_compile app/hardware/__init__.py
          python -m py_compile app/hardware/scanner.py
          python -m py_compile app/hardware/printer.py
          echo "✅ All Python files are syntactically valid"

      # ── Build the installer script ─────────────────────────────────────────
      - name: Build installer script
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p dist

          # Generate the one-command installer
          cat > dist/install.sh << 'INSTALLER'
          #!/bin/bash
          # ╔══════════════════════════════════════════════════════════════════╗
          # ║          ANTIGRAVITY POS — One-Command Installer                ║
          # ║                   by factarlou                                  ║
          # ╚══════════════════════════════════════════════════════════════════╝
          # Run on a fresh Raspberry Pi OS Lite (64-bit) after first boot:
          #   curl -sSL https://raw.githubusercontent.com/$REPO/main/dist/install.sh | bash

          set -e

          APP_DIR="/opt/antigravity"
          SERVICE_FILE="/etc/systemd/system/antigravity.service"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ANTIGRAVITY POS Installer"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # 1. System updates & dependencies
          echo "[1/5] Installing system dependencies..."
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-pip python3-venv \
            libgl1-mesa-dev libgles2-mesa-dev \
            libfontconfig1 libdbus-1-3 \
            fonts-dejavu-core \
            libbluetooth-dev bluetooth bluez

          # 2. Download & extract app
          echo "[2/5] Downloading Antigravity POS..."
          sudo mkdir -p "$APP_DIR"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/antigravity_pos_${TAG}_app.zip"
          curl -L --progress-bar "$RELEASE_URL" -o /tmp/antigravity_app.zip
          sudo unzip -o /tmp/antigravity_app.zip -d "$APP_DIR"
          rm /tmp/antigravity_app.zip

          # 3. Install Python packages
          echo "[3/5] Installing Python packages..."
          sudo python3 -m venv "$APP_DIR/.venv"
          sudo "$APP_DIR/.venv/bin/pip" install --upgrade pip --quiet
          sudo "$APP_DIR/.venv/bin/pip" install -r "$APP_DIR/requirements.txt" --quiet

          # 4. Create systemd service
          echo "[4/5] Setting up auto-start service..."
          sudo tee "$SERVICE_FILE" > /dev/null << EOF
          [Unit]
          Description=Antigravity POS by factarlou
          After=network.target
          Wants=graphical.target

          [Service]
          Type=simple
          User=pi
          Environment=QT_QPA_PLATFORM=eglfs
          Environment=QT_QPA_EGLFS_KMS_ATOMIC=1
          Environment=QT_QUICK_CONTROLS_STYLE=Basic
          Environment=PYTHONPATH=$APP_DIR
          WorkingDirectory=$APP_DIR
          ExecStart=$APP_DIR/.venv/bin/python3 $APP_DIR/main.py
          Restart=on-failure
          RestartSec=3

          [Install]
          WantedBy=graphical.target
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable antigravity.service

          # 5. Done
          echo "[5/5] Installation complete!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Antigravity POS installed!"
          echo "  Reboot to start automatically:"
          echo "    sudo reboot"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          INSTALLER

          chmod +x dist/install.sh

      # ── Package the app files ──────────────────────────────────────────────
      - name: Package app ZIP
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p dist/app_pkg

          # Copy app files
          cp -r app dist/app_pkg/
          cp -r ui  dist/app_pkg/
          cp -r assets dist/app_pkg/ 2>/dev/null || true
          cp main.py requirements.txt dist/app_pkg/

          # Create db directory
          mkdir -p dist/app_pkg/db

          cd dist/app_pkg
          zip -r "../antigravity_pos_${TAG}_app.zip" .
          cd ..
          sha256sum "antigravity_pos_${TAG}_app.zip" > "antigravity_pos_${TAG}_app.zip.sha256"

          echo "==> Package ready:"
          ls -lh *.zip *.sha256

      # ── Create the GitHub Release with the ZIP ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ANTIGRAVITY POS ${{ github.ref_name }}"
          files: |
            dist/antigravity_pos_${{ github.ref_name }}_app.zip
            dist/antigravity_pos_${{ github.ref_name }}_app.zip.sha256
            dist/install.sh
          body: |
            ## 🌌 ANTIGRAVITY POS ${{ github.ref_name }} by factarlou

            ### ⚡ Quick Install (Recommended — 5 minutes)

            > Flash **Raspberry Pi OS Lite 64-bit** to your SD card, boot your Pi Zero 2 W,
            > connect to WiFi, then run:

            ```bash
            curl -sSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/install.sh | bash
            sudo reboot
            ```

            The app will start automatically on every boot.

            ---

            ### 📦 Manual Install

            1. Download `antigravity_pos_${{ github.ref_name }}_app.zip`
            2. Verify: `sha256sum -c antigravity_pos_${{ github.ref_name }}_app.zip.sha256`
            3. Extract to `/opt/antigravity/` on your Pi
            4. Run `install.sh` manually

            ---

            ### Requirements
            - Raspberry Pi Zero 2 W (or Pi 3/4/5)
            - Raspberry Pi OS Lite 64-bit (latest)
            - 8GB+ microSD card
            - HDMI display
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2: Full RPi Image via pi-gen  (~25-35 min, on-demand only)
  # Uses the official Raspberry Pi Foundation build tool — MUCH more reliable
  # than Buildroot from scratch. Produces a .img.gz flashable with Etcher.
  # ───────────────────────────────────────────────────────────────────────────
  build_rpi_image:
    name: "💾 RPi SD Card Image (pi-gen)"
    runs-on: ubuntu-22.04
    needs: release_app
    # Only run when explicitly requested OR on tags that look like major releases (v1.0.0, v2.0.0)
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.build_image == 'true') ||
      (github.event_name == 'push' && startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-'))
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          echo "==> Free space: $(df -h / | tail -1 | awk '{print $4}')"

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@v3

      - name: Inject GitHub Tag into script
        run: |
          sed -i "s/THE_GITHUB_TAG/${{ github.ref_name }}/g" pi-gen-stage/00-install-antigravity/01-run.sh

      # ── Build the custom Pi image using pi-gen ─────────────────────────────
      # pi-gen is what the RPi Foundation uses to build Raspberry Pi OS itself.
      # It's battle-tested, well-documented, and completes in ~30 min.
      - name: Build RPi Image with pi-gen
        uses: usimd/pi-gen-action@v1
        id: build
        with:
          # Use the arm64 branch to build a 64-bit image (required for PySide6)
          pi-gen-version: 'arm64'
          # Base: Raspberry Pi OS Lite (no desktop, minimal)
          release: 'bookworm'
          image-name: antigravity_pos_${{ github.ref_name }}
          stage-list: stage0 stage1 stage2 pi-gen-stage
          compression: xz
          compression-level: 3
          # Enable to keep intermediate layer caches
          enable-noobs: false
          # Reduce image size — no recommended extras
          disable-first-boot-user-rename: true

      # ── Package and upload the image ───────────────────────────────────────
      - name: Upload image to release
        if: steps.build.outputs.image-path != ''
        uses: softprops/action-gh-release@v2
        with:
          name: "ANTIGRAVITY POS ${{ github.ref_name }}"
          files: |
            ${{ steps.build.outputs.image-path }}
          body: |
            ## 💾 SD Card Image Added

            An Etcher-ready `.img.xz` image has been added to this release.
            Flash it directly with [Raspberry Pi Imager](https://www.raspberrypi.com/software/)
            or Balena Etcher — no setup required.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
