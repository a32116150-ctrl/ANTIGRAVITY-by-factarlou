image boot.vfat {
  vfat {
    files = {
      "bcm2710-rpi-zero-2-w.dtb",
      "rpi-firmware/bootcode.bin",
      "rpi-firmware/cmdline.txt",
      "rpi-firmware/config.txt",
      "rpi-firmware/fixup.dat",
      "rpi-firmware/start.elf",
      "rpi-firmware/overlays",
      "Image"
    }
  }
  size = 32M
}

image rootfs.squashfs {
  squashfs {
  }
}

image data.f2fs {
  f2fs {
  }
  size = 512M
}

image sdcard.img {
  hdimage {
  }

  partition boot {
    partition-type = 0xC
    bootable = "true"
    image = "boot.vfat"
  }

  partition rootfs {
    partition-type = 0x83
    image = "rootfs.squashfs"
  }

  partition data {
    partition-type = 0x83
    image = "data.f2fs"
  }
}
